<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register - Elevate Constructors</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#f1f5f9;
        }

        .register-container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .register-card{
            width:100%;
            max-width:420px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo i{
            font-size:2.5rem;
            color:#2563eb;
            margin-bottom:10px;
        }

        .logo h2{
            margin:0;
            color:#1e293b;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#334155;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            font-size:1rem;
            outline:none;
            transition:0.3s;
            box-sizing:border-box;
        }

        .input-group input:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 3px rgba(37,99,235,0.1);
        }

        .register-btn{
            width:100%;
            padding:13px;
            border:none;
            border-radius:8px;
            background:#10b981;
            color:white;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .register-btn:hover{
            background:#059669;
        }

        .bottom-text{
            text-align:center;
            margin-top:18px;
            color:#64748b;
        }

        .bottom-text a{
            color:#2563eb;
            text-decoration:none;
            font-weight:600;
        }

        .bottom-text a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="register-container">

        <div class="register-card">

            <!-- LOGO -->
            <div class="logo">

                <i class="fa-solid fa-microchip"></i>

                <h2>Elevate Constructors Register</h2>

                <p style="color:#64748b;">
                    Create your account
                </p>

            </div>


            <!-- REGISTER FORM -->
            <form action="{{ url_for('register') }}"
                  method="POST"
                  autocomplete="off">

                <!-- USERNAME -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-user"></i>
                        Username
                    </label>

                    <input type="text"
                           name="username"
                           placeholder="Enter username"
                           required>

                </div>

                <!-- FULL NAME -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-id-card"></i>
                        Full Name
                    </label>

                    <input type="text"
                           name="name"
                           placeholder="Enter full name"
                           required>

                </div>


                <!-- EMAIL -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-envelope"></i>
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           placeholder="Enter email"
                           required>

                </div>

                <!-- DOB -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-calendar"></i>
                        Date of Birth
                    </label>

                    <input type="date"
                           name="dob">

                </div>

                <!-- CONTACT -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-phone"></i>
                        Contact
                    </label>

                    <input type="text"
                           name="contact"
                           placeholder="Enter contact number">

                </div>

                <!-- ADDRESS -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-location-dot"></i>
                        Address
                    </label>

                    <input type="text"
                           name="address"
                           placeholder="Enter address">

                </div>

                <!-- GENDER -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-venus-mars"></i>
                        Gender
                    </label>

                    <input type="text"
                           name="gender"
                           placeholder="Enter gender">

                </div>


                <!-- PASSWORD -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-lock"></i>
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           placeholder="Enter password"
                           required>

                </div>


                <!-- CONFIRM PASSWORD -->
                <div class="input-group">

                    <label>
                        <i class="fa-solid fa-shield-halved"></i>
                        Confirm Password
                    </label>

                    <input type="password"
                           name="confirm_password"
                           placeholder="Confirm password"
                           required>

                </div>


                <!-- BUTTON -->
                <button type="submit"
                        class="register-btn">

                    <i class="fa-solid fa-user-plus"></i>
                    Create Account

                </button>

            </form>


            <!-- LOGIN LINK -->
            <div class="bottom-text">

                Already have an account?

                <a href="{{ url_for('login') }}">
                    Login
                </a>

            </div>

        </div>

    </div>

</body>

</html>
